name: Validate notebook registry

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyyaml

      - run: python bin/check_notebook_registry.py
